<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>

    <!-- Tailwind and DaisyUi link -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome cdn -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 <!-- font link -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<style>
    *{
         font-family: "Geist", sans-serif;
    }
</style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class=" w-[300px] mx-auto pt-12 space-y-4">
        <img src="./assets/github-logo.png" alt=""  class="mx-auto">
        <h2 class="text-2xl font-bold text-center">GitHub Issues Tracker</h2>
        <p class="text-center text-gray-400">Sign in to manage your issues</p>
    </div>

<!-- Daisy ui form  -->
    <fieldset class="fieldset bg-white border-base-300 rounded-box  w-xs border p-4 mx-auto mt-10">
  <!-- <legend class="fieldset-legend">Login</legend> -->

  <label class="label text-gray-900">Username</label>
  <input id="user-btn" type="text" class="input" placeholder="Enter Username" />
  <span class="text-sky-600">Default: admin</span>

  <label class="label text-gray-900">Password</label>
  <input id="pass-btn" type="password" class="input" placeholder=" Enter Password" />
   <span class="text-sky-600">Default: admin123</span>
  <button id="sign-btn" class="btn btn-primary mt-4">Sign in</button>
  <div class="divider ">OR</div>
</fieldset>

<h5 class="text-center mt-5 text-gray-400">Demo Credentials:</h5>
<div class="text-center bg-gray-100  mx-18 my-5 p-3">
    <p><span class="font-bold">Username</span>: admin</p>
    <p><span class="font-bold">Password</span>: admin123</p>
</div>

<script src="login.js"></script>
</body>
</html>
