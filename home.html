        * {

<body class="bg-[#F8FAFC]">
    <!--Navbar section-->
    <header class="bg-base-100 shadow-sm  ">
        <section class="w-11/12 mx-auto">
            <div class="navbar flex-col md:flex-row gap-3">
                <div class="flex-1 flex  items-center gap-2">
                    <img src="./assets/github-logo.png" alt="" class="w-[40px]">
                    <a class="font-bold text-2xl">GitHub Issues Tracker</a>
                </div>
                <div class="flex gap-2">
                    <input id="input-search" type="text" placeholder="Search issues"
                        class="input input-bordered w-24 md:w-auto" />

                    <button id="btn-search" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>

                </div>
            </div>
        </section>
    </header>

    <section class="w-10/12 mx-auto mt-12 space-y-5">

        <div class="bg-white p-5 shadow-lg rounded-md">
            <button id="filter-all" class="btn  btn-primary w-20">All</button>
            <button id="filter-open" class="btn  btn-ghost w-20">Open</button>
            <button id="filter-closed" class="btn  btn-ghost w-20">Closed</button>

        </div>

       <section class="flex justify-between bg-white shadow-sm p-8 md:flex-row flex-col">
        <div class="flex items-center gap-1">
            <img src="./assets/Aperture.png" alt="" class="w-12 bg-[#ECE4FF] rounded-full p-2">
            <div>
                <p class="font-bold text-xl"><span  id="issue-count">50</span> Issues</p>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <span class="bg-[#00A96E] h-4 w-4 rounded-full"></span>
            <p>Open</p>
            <span class="bg-[#A855F7] h-4 w-4 rounded-full"></span>
            <p>Closed</p>
        </div>
       </section>
