<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page| github-issue-tracker</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Tailwind and DaisyUi link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="bg-[#F8FAFC]">
    <!--Navbar section-->
    <header class="bg-base-100 shadow-sm  ">
        <section class="w-11/12 mx-auto">
            <div class="navbar flex-col md:flex-row gap-3">
                <div class="flex-1 flex  items-center gap-2">
                    <img src="./assets/github-logo.png" alt="" class="w-[40px]">
                    <a class="font-bold text-2xl">GitHub Issues Tracker</a>
                </div>
                <div class="flex gap-2">
                    <input id="input-search" type="text" placeholder="Search issues"
                        class="input input-bordered w-24 md:w-auto" />

                    <button id="btn-search" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>

                </div>
            </div>
        </section>
    </header>

    <section class="w-10/12 mx-auto mt-12 space-y-5">

        <div class="bg-white p-5 shadow-lg rounded-md">
            <button id="filter-all" class="btn  btn-primary w-20">All</button>
            <button id="filter-open" class="btn  btn-ghost w-20">Open</button>
            <button id="filter-closed" class="btn  btn-ghost w-20">Closed</button>

        </div>

        <section class="flex justify-between bg-white shadow-sm p-8 md:flex-row flex-col">
            <div class="flex items-center gap-1">
                <img src="./assets/Aperture.png" alt="" class="w-12 bg-[#ECE4FF] rounded-full p-2">
                <div>
                    <p class="font-bold text-xl"><span id="issue-count">50</span> Issues</p>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <span class="bg-[#00A96E] h-4 w-4 rounded-full"></span>
                <p>Open</p>
                <span class="bg-[#A855F7] h-4 w-4 rounded-full"></span>
                <p>Closed</p>
            </div>
        </section>

        <!-- loading spinner -->
        <section id="spinner" class="flex justify-center items-center py-5 hidden">
            <span class="loading loading-ball loading-xs"></span>
            <span class="loading loading-ball loading-sm"></span>
            <span class="loading loading-ball loading-md"></span>
            <span class="loading loading-ball loading-lg"></span>
            <span class="loading loading-ball loading-xl"></span>
        </section>



        <!-- card container -->

        <section id="card-container" class=" bg-white grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 p-5 gap-3">

            
        </section>

    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal.showModal()">open modal</button> -->
    <dialog id="my_modal" class="modal">
        <div class="modal-box">
            <div id="modal-container">

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-soft btn-primary outline-none">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="script.js"></script>

</body>

</html>
